# =====================================================================
# TimeDomainDataset 配置模板
# 对应类: ser_lib.dataset.time_domain_dataset.TimeDomainDataset
#
# 任务定位: 加载波形 → 时域增强 → 提取时域特征（F0/RMS/ZCR等）→ 拼接为矩阵
# 适用模型: 传统 SVM / 混合模型，使用手工时域特征的轻量分类器
#
# __getitem__ 输出: {"time_features": Tensor[n_features, T]}, label, seq_length
# =====================================================================

# ---------------------------------------------------------------------
# 1. 基础元数据
# ---------------------------------------------------------------------
dataset_name: "my_dataset"
num_classes: 4

class_mapping:
  0: { en: "Neutral", zh: "平静" }
  1: { en: "Happy",   zh: "高兴" }
  2: { en: "Sad",     zh: "悲伤" }
  3: { en: "Angry",   zh: "愤怒" }

# ---------------------------------------------------------------------
# 2. 路径配置
# ---------------------------------------------------------------------
paths:
  metadata_dir: "./data/my_dataset/metadata"
  data_root_dir: "./data/my_dataset/audio"

data_lists:
  train: "train.jsonl"
  val:   "val.jsonl"
  test:  "test.jsonl"

audio:
  target_sr: 16000

# ---------------------------------------------------------------------
# 3. DataLoader 批处理策略
# ---------------------------------------------------------------------
# collate_fn 输出格式 (truncate_pad):
#   ({"x": {"time_features": [B, 1, n_features, T_fixed]}}, Labels[B])
#
# collate_fn 输出格式 (dynamic_mask):
#   ({"x": {"time_features": [B, T_max, n_features]}, "mask": [B, T_max]}, Labels[B])
audio_processing:
  strategy: "truncate_pad"
  max_frames: 300            # 以 hop_length=256, 16kHz 为基准，300帧 ≈ 4.8s
  window_size: 300           # [sliding_window 专用]
  stride: 150

# ---------------------------------------------------------------------
# 4. 时域特征提取
# 所有时域特征将沿第 0 维拼接为 [n_features, T]
# 请确保各特征使用相同的 hop_length 以保证时间步对齐
# ---------------------------------------------------------------------
features:
  time_domain:
    f0:
      type: "F0"
      sample_rate: 16000
      hop_length: 256

    rms:
      type: "RMS"
      win_length: 400
      hop_length: 256

    zcr:
      type: "ZCR"
      win_length: 400
      hop_length: 256

    # spectral_centroid:
    #   type: "SpectralCentroid"
    #   sample_rate: 16000
    #   n_fft: 1024
    #   hop_length: 256

    # spectral_rolloff:
    #   type: "SpectralRolloff"
    #   sample_rate: 16000
    #   n_fft: 1024
    #   hop_length: 256
    #   roll_percent: 0.85

    # spectral_flatness:
    #   type: "SpectralFlatness"
    #   n_fft: 1024
    #   hop_length: 256

    # spectral_flux:
    #   type: "SpectralFlux"
    #   n_fft: 1024
    #   hop_length: 256

# ---------------------------------------------------------------------
# 5. 时域增强（TimeDomainDataset 只使用波形级增强）
# ---------------------------------------------------------------------
transforms:
  waveform_level:
    train:
      # - type: "Normalize"
      # - type: "AddGaussianNoise"
      #   snr: 15.0
      #   p: 0.5
      # - type: "PitchShift"
      #   n_steps: 4
      #   p: 0.5
      # - type: "TimeStretch"
      #   rate: 1.2
      #   p: 0.5
      # - type: "TimeShift"
      #   shift_max_ratio: 0.2
      #   p: 0.5
      # - type: "VolumeScale"
      #   gain_min: 0.5
      #   gain_max: 1.5
      #   p: 0.5
    val:
    test:

  advanced_waveform_level:   # 课程 7 预留
