# =====================================================================
# FeatureDataset 标准配置模板
# 对应类: ser_lib.dataset.feature_dataset.FeatureDataset
#
# 任务定位: 自由组合多种声学特征 (F0, RMS, ZCR, SpectralCentroid 等)，
#           以字典形式返回各特征 Tensor，适用于自定义特征融合架构。
#
# __getitem__ 输出: {"f0": Tensor[T], "rms": Tensor[T], ...}, label, seq_length
#
# 【配置隔离规则】本配置文件必须包含 features 节点，不得包含 spectrogram 节点
# =====================================================================

# ---------------------------------------------------------------------
# 1. 数据集元数据
# ---------------------------------------------------------------------
dataset_name: "my_feature_dataset"
num_classes: 6

class_mapping:
  0: { en: "Neutral", zh: "平静" }
  1: { en: "Happy", zh: "高兴" }
  2: { en: "Angry", zh: "愤怒" }
  3: { en: "Sad", zh: "悲伤" }
  4: { en: "Surprise", zh: "惊吓" }
  5: { en: "Fear", zh: "恐惧" }

# ---------------------------------------------------------------------
# 2. 路径配置
# ---------------------------------------------------------------------
paths:
  metadata_dir: "./data/my_dataset/metadata"
  data_root_dir: "./data/my_dataset/audio"

data_lists:
  train: "train.jsonl"
  val: "val.jsonl"
  test: "test.jsonl"

# ---------------------------------------------------------------------
# 3. 音频基础参数
# ---------------------------------------------------------------------
audio:
  target_sr: 16000

# ---------------------------------------------------------------------
# 4. DataLoader 批处理策略
# ---------------------------------------------------------------------
# FeatureDataset 返回多特征字典，推荐使用 dynamic_mask 保留真实长度
#
# 策略说明:
#   - truncate_pad: 固定长度填充/截断，输出 [B, 1, D, T_fixed]，适合 CNN
#   - dynamic_mask: 动态长度 + 注意力掩码，输出 [B, T_max, D] + mask，适合 Transformer
#   - sliding_window: 滑动窗口切分，用于长音频评估投票
#
# collate_fn 输出格式 (dynamic_mask):
#   ({"x": {"f0": [B, T_max, 1], "rms": [B, T_max, 1], ...}, "mask": [B, T_max]}, Labels[B])
# ---------------------------------------------------------------------
audio_processing:
  strategy: "dynamic_mask"
  max_frames: 300            # [truncate_pad 专用]
  window_size: 300           # [sliding_window 专用] 窗口大小
  stride: 150                # [sliding_window 专用] 步长 (50% 重叠)

# ---------------------------------------------------------------------
# 5. 多特征配置 (FeatureDataset 专属)
# 支持类型:
#   - 谱图类: Spectrogram, MelSpectrogram, LogMelSpectrogram, MFCC
#   - 时域韵律特征: F0, RMS, ZCR, JitterShimmerHNR
#   - 频域特征: SpectralCentroid, SpectralRolloff, SpectralFlatness, SpectralFlux, Delta
# ---------------------------------------------------------------------
features:
  selected_features:
    # ================================================================
    # 韵律特征 (Prosodic Features)
    # ================================================================

    # 基频 F0 (音高) - 反映发音人的音高变化
    f0:
      type: "F0"
      kwargs:
        hop_length: 256      # 帧移步长
        # freq_low: 50       # 基频检测下限 (Hz)，默认 50
        # freq_high: 800     # 基频检测上限 (Hz)，默认 800

    # 短时能量 RMS (响度) - 反映声音的响度/能量
    rms:
      type: "RMS"
      kwargs:
        win_length: 400      # 窗口长度
        hop_length: 256      # 帧移步长

    # 过零率 ZCR - 高频成分多的声音过零率高
    zcr:
      type: "ZCR"
      kwargs:
        win_length: 400
        hop_length: 256

    # ================================================================
    # 频域特征 (Spectral Features)
    # ================================================================

    # 谱质心 (声音明亮度) - 表示频谱的"重心"频率位置
    spectral_centroid:
      type: "SpectralCentroid"
      kwargs:
        n_fft: 1024          # FFT 窗口大小
        hop_length: 256

    # 谱滚降 (频谱分布) - 累积幅度达到总能量特定比例的频率点
    spectral_rolloff:
      type: "SpectralRolloff"
      kwargs:
        n_fft: 1024
        hop_length: 256
        roll_percent: 0.85   # 能量百分比阈值，范围: [0.0, 1.0]

    # 谱平坦度 (纯音 vs 噪声) - 几何平均值与算术平均值的比值
    spectral_flatness:
      type: "SpectralFlatness"
      kwargs:
        n_fft: 1024
        hop_length: 256

    # 谱通量 (起音检测) - 相邻帧频谱之间变化速率
    spectral_flux:
      type: "SpectralFlux"
      kwargs:
        n_fft: 1024
        hop_length: 256

    # ================================================================
    # 音质特征 (Voice Quality) - 语句级标量特征
    # ================================================================

    # Jitter/Shimmer/HNR - 音质波动特征 (需配合 F0 使用)
    # jitter_shimmer_hnr:
    #   type: "JitterShimmerHNR"

    # ================================================================
    # 差分动态特征 (Delta Features)
    # ================================================================

    # 一阶/二阶差分 (需配合其他特征使用)
    # delta:
    #   type: "Delta"
    #   kwargs:
    #     win_length: 5       # 差分窗口长度，必须为 >=3 的奇数

# ---------------------------------------------------------------------
# 6. 数据增强配置
# FeatureDataset 使用 waveform_level，不使用 spectrogram_level
# ---------------------------------------------------------------------
transforms:
  # ================================================================
  # 波形级基础增强
  # ================================================================
  waveform_level:
    train:
      # 示例 1: 波形归一化
      - type: "Normalize"

      # 示例 2: 高斯噪声注入
      - type: "AddGaussianNoise"
        snr: 18.0            # 信噪比 (dB)，范围: [5.0, 40.0]
        p: 0.5

      # 示例 3: 时间平移
      - type: "TimeShift"
        shift_max_ratio: 0.15
        p: 0.3

      # 示例 4: 音量缩放
      - type: "VolumeScale"
        gain_min: 0.75
        gain_max: 1.25
        p: 0.4

    val: []
    test: []

  # ================================================================
  # 波形级高级增强
  # ================================================================
  advanced_waveform_level:
    train:
      # 示例 1: 音调偏移
      - type: "PitchShift"
        n_steps: 2           # 半音阶数，范围: [-12, 12]
        p: 0.3

      # 示例 2: 时间拉伸
      - type: "TimeStretch"
        rate: 1.1            # 速率，范围: [0.5, 2.0]
        p: 0.3

      # 示例 3: 动态背景噪声混合 (需外部噪声库如 MUSAN)
      # - type: "DynamicSNRMixing"
      #   noise_dataset_path: "./data/musan"
      #   p: 0.3

    val: []
    test: []

  # ================================================================
  # 频域增强 (FeatureDataset 不使用，保留为空)
  # ================================================================
  spectrogram_level:
    train: []
    val: []
    test: []

  # ================================================================
  # 批次级增强
  # ================================================================
  batch_level:
    train:
      # 示例: Mixup 样本混合 (需在 collate_fn 中实现)
      # - type: "Mixup"
      #   alpha: 0.2          # Beta 分布参数，范围: [0.1, 1.0]
      #   p: 0.5
    val: []
    test: []
