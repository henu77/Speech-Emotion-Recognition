# =====================================================================
# FeatureDataset 配置模板
# 对应类: ser_lib.dataset.feature_dataset.FeatureDataset
#
# 任务定位: 自由挑选不同的时域及其他类型声学特征（F0, RMS, ZCR等），
#           以字典分别返回各维度 Tensor，方便自定义组合或对齐。
# =====================================================================

# ---------------------------------------------------------------------
# 1. 基础元数据
# ---------------------------------------------------------------------
dataset_name: "my_feature_dataset"
num_classes: 4

class_mapping:
  0: { en: "Neutral", zh: "平静" }
  1: { en: "Happy",   zh: "高兴" }
  2: { en: "Sad",     zh: "悲伤" }
  3: { en: "Angry",   zh: "愤怒" }

# ---------------------------------------------------------------------
# 2. 路径配置
# ---------------------------------------------------------------------
paths:
  metadata_dir: "./data/my_dataset/metadata"
  data_root_dir: "./data/my_dataset/audio"

data_lists:
  train: "train.jsonl"
  val:   "val.jsonl"
  test:  "test.jsonl"

audio:
  target_sr: 16000

# ---------------------------------------------------------------------
# 3. DataLoader 批处理策略
# ---------------------------------------------------------------------
audio_processing:
  strategy: "dynamic_mask"   # 推荐: dynamic_mask 适合序列输入
  max_frames: 300            # [truncate_pad 专用]
  window_size: 300           # [sliding_window 专用]
  stride: 150

# ---------------------------------------------------------------------
# 4. 特征抽取配置 (可组合多个)
# ---------------------------------------------------------------------
features:
  selected_features:
    f0:       # 特征名为 "f0"
      type: "F0"
      kwargs:
        hop_length: 160
        fmin: 50.0
        fmax: 500.0
    rms:      # 特征名为 "rms"
      type: "RMS"
      kwargs:
        frame_length: 400
        hop_length: 160
    zcr:      # 特征名为 "zcr"
      type: "ZCR"
      kwargs:
        frame_length: 400
        hop_length: 160

# ---------------------------------------------------------------------
# 5. 数据增强 (时域级别)
# ---------------------------------------------------------------------
transforms:
  waveform_level:
    train:
      # - type: "Normalize"
      # - type: "AddGaussianNoise"
      #   snr: 15.0
      #   p: 0.5
    val:
    test:

  advanced_waveform_level:
    train:
      # - type: "RIR_Simulation"
      #   rir_path: "./data/rir_room.wav"
      #   p: 0.5
