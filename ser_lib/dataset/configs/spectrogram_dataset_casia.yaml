# =====================================================================
# SpectrogramDataset 标准配置文件
# 对应类: ser_lib.dataset.spectrogram_dataset.SpectrogramDataset
#
# 任务定位: 提取单一谱图特征 (Spectrogram, MelSpectrogram, LogMelSpectrogram, MFCC)，
#           并应用频域增强，适用于 2D CNN 模型。
#
# __getitem__ 输出: {"<spec_type>": Tensor[Freq, T]}, label, seq_length
#
# 【配置隔离规则】本配置文件必须包含 spectrogram 节点，不得包含 features 节点
# =====================================================================

# ---------------------------------------------------------------------
# 1. 数据集元数据
# ---------------------------------------------------------------------
dataset_name: "CASIA_Spectrogram"
num_classes: 6

class_mapping:
  0: { en: "Neutral", zh: "平静" }
  1: { en: "Happy", zh: "高兴" }
  2: { en: "Angry", zh: "愤怒" }
  3: { en: "Sad", zh: "悲伤" }
  4: { en: "Surprise", zh: "惊吓" }
  5: { en: "Fear", zh: "恐惧" }

# ---------------------------------------------------------------------
# 2. 路径配置
# ---------------------------------------------------------------------
paths:
  metadata_dir: "ser_lib/dataset/configs/casia"
  data_root_dir: "data/CASIA"

data_lists:
  train: "train.jsonl"
  val: "val.jsonl"
  test: "test.jsonl"

# ---------------------------------------------------------------------
# 3. 音频基础参数
# ---------------------------------------------------------------------
audio:
  target_sr: 16000

# ---------------------------------------------------------------------
# 4. DataLoader 批处理策略
# ---------------------------------------------------------------------
# SpectrogramDataset 返回 2D 谱图 [Freq, T]，推荐使用 truncate_pad
# collate_fn 输出格式 (truncate_pad):
#   {"inputs": {"logmelspectrogram": [B, 1, Freq, T_fixed]}, "labels": [B], "lengths": [B], "mask": None, "meta": {...}}
# collate_fn 输出格式 (dynamic_mask):
#   {"inputs": {"logmelspectrogram": [B, T_max, Freq]}, "labels": [B], "lengths": [B], "mask": [B, T_max], "meta": {...}}
# collate_fn 输出格式 (sliding_window):
#   {"inputs": {"logmelspectrogram": [B_expanded, 1, Freq, T_window]}, "labels": [B_expanded], "lengths": [B_expanded],
#    "mask": None, "meta": {"window_counts": [B], "original_labels": [B], ...}}
# ---------------------------------------------------------------------
audio_processing:
  strategy: "truncate_pad"
  max_frames: 300            # 约 3s 语音 (hop_length=256, sr=16000)
  window_size: 300           # [sliding_window 专用]
  stride: 150                # [sliding_window 专用] 50% 重叠

# ---------------------------------------------------------------------
# 5. 谱图特征配置 (SpectrogramDataset 专属)
# 支持类型: Spectrogram, MelSpectrogram, LogMelSpectrogram, MFCC
# ---------------------------------------------------------------------
spectrogram:
  type: "LogMelSpectrogram"
  kwargs:
    sample_rate: 16000
    n_fft: 1024              # FFT 窗口大小
    win_length: 1024         # 窗函数长度
    hop_length: 256          # 帧移步长
    n_mels: 80               # Mel 滤波器组数量
    f_min: 0.0               # 最低频率 (Hz)
    f_max: 8000.0            # 最高频率 (Hz)
    power: 2.0               # 能量谱指数
    top_db: 80.0             # Log-Mel 动态范围裁剪 (dB)

# ---------------------------------------------------------------------
# 6. 数据增强配置
# SpectrogramDataset 使用 waveform_level + spectrogram_level
# ---------------------------------------------------------------------
transforms:
  # 波形级基础增强 (谱图提取前执行)
  waveform_level:
    train:
      # 示例 1: 高斯噪声注入
      - type: "AddGaussianNoise"
        snr: 20.0
        p: 0.5

      # 示例 2: 音量缩放
      - type: "VolumeScale"
        gain_min: 0.8
        gain_max: 1.2
        p: 0.4

      # 示例 3: 时间平移
      - type: "TimeShift"
        shift_max_ratio: 0.15
        p: 0.3

    val: []
    test: []

  # 波形级高级增强
  advanced_waveform_level:
    train:
      # 示例 1: 音调偏移
      - type: "PitchShift"
        n_steps: 2
        p: 0.3

      # 示例 2: 时间拉伸
      - type: "TimeStretch"
        rate: 1.1
        p: 0.3

    val: []
    test: []

  # 频域增强 (谱图提取后执行) - SpectrogramDataset 核心增强
  spectrogram_level:
    train:
      # 示例 1: SpecAugment 时频掩码
      - type: "SpecMasking"
        time_mask_param: 40   # 时间掩码最大宽度
        freq_mask_param: 15   # 频率掩码最大宽度
        p: 0.5

      # 示例 2: 随机频带滤波
      - type: "FilterAugment"
        n_band: 2             # 频带数量
        db_range: [-6.0, 6.0] # 增益范围 (dB)
        band_width_ratio: 0.2 # 频带宽度比例
        p: 0.4

      # 示例 3: 声道长度扰动 (模拟不同说话人)
      - type: "VTLP"
        warp_factor_range: [0.9, 1.1]
        p: 0.3

    val: []
    test: []

  # 批次级增强
  batch_level:
    train:
      # 示例: Mixup (需在 collate_fn 中实现)
      # - type: "Mixup"
      #   alpha: 0.2
      #   p: 0.5
    val: []
    test: []
