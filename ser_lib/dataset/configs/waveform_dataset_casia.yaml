# =====================================================================
# WaveformDataset 标准配置文件
# 对应类: ser_lib.dataset.waveform_dataset.WaveformDataset
#
# 任务定位: 加载原始波形并应用时域增强，不做任何特征提取。
# 适用模型: Wav2Vec2, HuBERT, RawNet 等端到端原始波形模型。
#
# __getitem__ 输出: {"raw_waveform": Tensor[T]}, label, seq_length
#
# 【配置隔离规则】本配置文件不得包含 spectrogram 或 features 节点
# =====================================================================

# ---------------------------------------------------------------------
# 1. 数据集元数据
# ---------------------------------------------------------------------
dataset_name: "CASIA_Waveform"
num_classes: 6

class_mapping:
  0: { en: "Neutral", zh: "平静" }
  1: { en: "Happy", zh: "高兴" }
  2: { en: "Angry", zh: "愤怒" }
  3: { en: "Sad", zh: "悲伤" }
  4: { en: "Surprise", zh: "惊吓" }
  5: { en: "Fear", zh: "恐惧" }

# ---------------------------------------------------------------------
# 2. 路径配置
# ---------------------------------------------------------------------
paths:
  metadata_dir: "ser_lib/dataset/configs/casia"
  data_root_dir: "data/CASIA"

data_lists:
  train: "train.jsonl"
  val: "val.jsonl"
  test: "test.jsonl"

# ---------------------------------------------------------------------
# 3. 音频基础参数
# ---------------------------------------------------------------------
audio:
  target_sr: 16000

# ---------------------------------------------------------------------
# 4. DataLoader 批处理策略
# ---------------------------------------------------------------------
# WaveformDataset 返回 1D 序列 [T]，推荐使用 dynamic_mask 保留真实长度
# collate_fn 输出格式 (dynamic_mask):
#   ({"x": {"raw_waveform": [B, T_max]}, "mask": [B, T_max]}, Labels[B])
# collate_fn 输出格式 (truncate_pad):
#   ({"x": {"raw_waveform": [B, 1, 1, T_fixed]}}, Labels[B])
# ---------------------------------------------------------------------
audio_processing:
  strategy: "dynamic_mask"
  max_frames: 64000          # [truncate_pad 专用] 16kHz × 4s = 64000 采样点
  window_size: 64000         # [sliding_window 专用]
  stride: 32000              # [sliding_window 专用] 50% 重叠

# ---------------------------------------------------------------------
# 5. 数据增强配置
# WaveformDataset 仅使用 waveform_level 与 advanced_waveform_level
# spectrogram_level 与 batch_level 对本数据集类无效
# ---------------------------------------------------------------------
transforms:
  # 波形级基础增强 (提取特征前执行)
  waveform_level:
    train:
      # 示例 1: 高斯噪声注入 - 模拟录音环境噪声
      - type: "AddGaussianNoise"
        snr: 15.0            # 信噪比 (dB)，值越小噪声越强
        p: 0.5               # 触发概率

      # 示例 2: 时间平移 - 增强时间不变性
      - type: "TimeShift"
        shift_max_ratio: 0.2 # 最大平移比例
        p: 0.3

      # 示例 3: 音量缩放 - 模拟麦克风距离变化
      - type: "VolumeScale"
        gain_min: 0.7
        gain_max: 1.3
        p: 0.4

    val: []                  # 验证集不使用增强
    test: []                 # 测试集不使用增强

  # 波形级高级增强 (环境鲁棒性)
  advanced_waveform_level:
    train:
      # 示例 1: 音调偏移 - 模拟不同说话人音高
      - type: "PitchShift"
        n_steps: 2           # 半音阶数，正数升高，负数降低
        p: 0.3

      # 示例 2: 时间拉伸 - 改变语速不改变音调
      - type: "TimeStretch"
        rate: 1.1            # 速率，>1 加速，<1 减速
        p: 0.3

      # 示例 3: 房间冲激响应混响 (需外部 RIR 数据库)
      # - type: "RIR_Simulation"
      #   rir_path: "./data/rir/room_impulse_response.wav"
      #   p: 0.3

    val: []
    test: []

  # 频域增强 (WaveformDataset 不使用，保留为空)
  spectrogram_level:
    train: []
    val: []
    test: []

  # 批次级增强
  batch_level:
    train:
      # 示例: Mixup 样本混合 (需在 collate_fn 中实现)
      # - type: "Mixup"
      #   alpha: 0.2
      #   p: 0.5
    val: []
    test: []
